<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Developer Profile</title>
    <style>
        * { margin: 0; padding: 0; box-box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .profile-pic {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            margin-bottom: 20px;
            display: inline-block;
            border: 3px solid #764ba2;
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { font-size: 1rem; opacity: 0.9; margin-bottom: 20px; }

        .btn {
            display: block;
            background: white;
            color: #764ba2;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #f0f0f0; letter-spacing: 1px; }

        .badge {
            font-size: 0.8rem;
            background: #4cd137;
            padding: 5px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Live on GitHub</div>
        <div class="profile-pic"></div> <h1>Student Developer</h1>
        <p>Learning Java, Spring Boot, and Web Development. Check out my GitHub projects below!</p>
        <a href="#" class="btn">View My Portfolio</a>
    </div>

</body>
</html>
